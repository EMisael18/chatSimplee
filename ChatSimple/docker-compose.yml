version: '3.8'

services:
    mysql:
      image: mysql:8.0
      command: --bind-address 0.0.0.0
      container_name: mysql_server
      restart: always
      environment:
        MYSQL_ROOT_PASSWORD: JoseLuis
        MYSQL_DATABASE: chat
        MYSQL_USER: Luis
        MYSQL_PASSWORD: JoseLuis
      ports:
        - "3306:3306"
      volumes:
        - mysql_data:/var/lib/mysql
        - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      networks:
        - mysql_network
volumes:
    mysql_data:
      driver: local
networks:
    mysql_network:
      driver: bridge